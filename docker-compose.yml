version: "3.9"

services:
  app1:
    build: .
    container_name: app1
    environment:
      - INSTANCE_NAME=app1

  app2:
    build: .
    container_name: app2
    environment:
      - INSTANCE_NAME=app2

  app3:
    build: .
    container_name: app3
    environment:
      - INSTANCE_NAME=app3

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    ports:
      - "8080:80"
    depends_on:
      - app1
      - app2
      - app3
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
